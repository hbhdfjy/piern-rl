# PDEBench 任务 RL 训练配置

# 任务标识
task: pdebench
data_dir: data/pdebench/

# 模型初始化（必须从 Stage 3 检查点启动）
model:
  base_model: Qwen/Qwen3-0.6B
  stage3_checkpoint: null  # 填入 Stage 3 训练完成后的检查点路径
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

# GRPO 超参数
grpo:
  num_rollouts: 8           # 每步 rollout 数量
  max_new_tokens: 384
  temperature: 0.7
  kl_coef: 0.05             # KL 惩罚系数（防止语言能力退化）
  clip_range: 0.2           # PPO clip 范围

# 训练循环
training:
  max_steps: 8000
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  warmup_steps: 200
  save_steps: 800
  eval_steps: 400

# 奖励函数（PDEBench）
reward:
  # RMSE vs 真值
  metric: rmse
  normalize: true           # 按真值范围归一化 RMSE

# 专家配置（3 个 FNO 模型）
experts:
  n_experts: 3
  pde_types:
    - diffusion_reaction     # 扩散-反应方程
    - shallow_water          # 浅水方程
    - compressible_ns        # 可压缩 Navier-Stokes

# 日志
logging:
  wandb_project: piern-rl
  wandb_run_name: pdebench-grpo
  log_steps: 10

# 随机种子
seed: 42
