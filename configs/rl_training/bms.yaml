# BMS（电池管理系统）任务 RL 训练配置

# 任务标识
task: bms
data_dir: data/bms/

# 模型初始化（必须从 Stage 3 检查点启动）
model:
  base_model: Qwen/Qwen3-0.6B
  stage3_checkpoint: null  # 填入 Stage 3 训练完成后的检查点路径
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

# GRPO 超参数
grpo:
  num_rollouts: 8           # 每步 rollout 数量
  max_new_tokens: 256       # 每次生成最大 token 数
  temperature: 0.7
  kl_coef: 0.05             # KL 惩罚系数（防止语言能力退化）
  clip_range: 0.2           # PPO clip 范围

# 训练循环
training:
  max_steps: 5000
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  warmup_steps: 100
  save_steps: 500
  eval_steps: 200

# 奖励函数（BMS）
reward:
  # R = Δp·P - α·c_a·1200
  alpha: 0.1                # 成本惩罚系数
  # Δp 和 P 由环境动态计算

# 日志
logging:
  wandb_project: piern-rl
  wandb_run_name: bms-grpo
  log_steps: 10

# 随机种子
seed: 42
