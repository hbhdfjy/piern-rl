output_dir: data/modflow
output_file: land_subsidence_groundwater_timeseries.h5
n_samples: 100000
n_timesteps: 365
n_wells: 5
grid:
  nrow: 20
  ncol: 20
  nlay: 3
  delr: 100.0
  delc: 100.0
  top: 30.0
  botm:
  - 20.0
  - 10.0
  - 0.0
params:
  hk_layer1_min: 10.0
  hk_layer1_max: 80.0
  hk_layer2_min: 0.5
  hk_layer2_max: 5.0
  hk_layer3_min: 5.0
  hk_layer3_max: 40.0
  sy_min: 0.05
  sy_max: 0.3
  pumping_min: -1500.0
  pumping_max: -500.0
  strt_layer1_min: 25.0
  strt_layer1_max: 28.0
  strt_layer2_min: 15.0
  strt_layer2_max: 18.0
  strt_layer3_min: 5.0
  strt_layer3_max: 8.0
  rch_min: 0.0001
  rch_max: 0.002
  sub_cr_min: 1.0e-05
  sub_cr_max: 0.0001
  sub_cc_min: 0.001
  sub_cc_max: 0.01
  sub_void_min: 0.3
  sub_void_max: 0.7
  sub_thick_min: 5.0
  sub_thick_max: 15.0
augmentation:
  enabled: true
  method: parameter_sampling
  n_augmented_per_sample: 0.2
  perturbation_ratio: 0.05
validation:
  max_nan_ratio: 0.05
  min_variance: 1.0e-06
  max_head_value: 35.0
  min_head_value: -5.0
seed: 50
