description: "\u5F31\u62BD\u6C34\u573A\u666F\uFF08\u5408\u7406\u5F00\u91C7\uFF09"
output_dir: data/modflow
output_file: light_pumping_groundwater_timeseries.h5
n_samples: 100000
n_timesteps: 365
n_wells: 5
grid:
  nrow: 20
  ncol: 20
  nlay: 1
  delr: 100.0
  delc: 100.0
  top: 10.0
  botm: 0.0
params:
  hk_min: 5.0
  hk_max: 30.0
  sy_min: 0.1
  sy_max: 0.25
  pumping_min: -1000.0
  pumping_max: -200.0
  strt_min: 5.0
  strt_max: 9.0
  rch_min: 0.005
  rch_max: 0.03
augmentation:
  enabled: true
  method: parameter_sampling
  n_augmented_per_sample: 0.2
  perturbation_ratio: 0.05
validation:
  max_nan_ratio: 0.05
  min_variance: 1.0e-06
  max_head_value: 20.0
  min_head_value: -10.0
seed: 8915
