output_dir: data/modflow
output_file: heterogeneous_field_groundwater_timeseries.h5
n_samples: 100000
n_timesteps: 365
n_wells: 5
grid:
  nrow: 30
  ncol: 30
  nlay: 1
  delr: 100.0
  delc: 100.0
  top: 10.0
  botm: 0.0
params:
  hk_mean_log_min: 0.5
  hk_mean_log_max: 1.5
  hk_std_log_min: 0.3
  hk_std_log_max: 0.7
  hk_correlation_length_min: 300.0
  hk_correlation_length_max: 700.0
  sy_min: 0.1
  sy_max: 0.2
  pumping_min: -6000.0
  pumping_max: -1000.0
  strt_min: 5.0
  strt_max: 9.0
  rch_min: 0.001
  rch_max: 0.02
heterogeneity:
  enabled: true
  method: gaussian_random_field
  anisotropy_ratio: 2.0
augmentation:
  enabled: true
  method: parameter_sampling
  n_augmented_per_sample: 0.2
  perturbation_ratio: 0.05
validation:
  max_nan_ratio: 0.05
  min_variance: 1.0e-06
  max_head_value: 15.0
  min_head_value: -5.0
seed: 45
