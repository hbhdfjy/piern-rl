description: "\u7C97\u7F51\u683C\uFF0810\xD710\uFF0C\u533A\u57DF\u5C3A\u5EA6\uFF09"
output_dir: data/modflow
output_file: coarse_grid_10x10_groundwater_timeseries.h5
n_samples: 100000
n_timesteps: 365
n_wells: 5
grid:
  nrow: 10
  ncol: 10
  nlay: 1
  delr: 200.0
  delc: 200.0
  top: 10.0
  botm: 0.0
params:
  hk_min: 1.0
  hk_max: 50.0
  sy_min: 0.05
  sy_max: 0.3
  pumping_min: -5000.0
  pumping_max: -500.0
  strt_min: 5.0
  strt_max: 9.0
  rch_min: 0.001
  rch_max: 0.02
augmentation:
  enabled: true
  method: parameter_sampling
  n_augmented_per_sample: 0.2
  perturbation_ratio: 0.05
validation:
  max_nan_ratio: 0.05
  min_variance: 1.0e-06
  max_head_value: 20.0
  min_head_value: -10.0
seed: 7160
