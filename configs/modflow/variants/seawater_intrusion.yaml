output_dir: data/modflow
output_file: seawater_intrusion_groundwater_timeseries.h5
n_samples: 100000
n_timesteps: 365
n_wells: 5
grid:
  nrow: 20
  ncol: 40
  nlay: 1
  delr: 100.0
  delc: 100.0
  top: 5.0
  botm: -15.0
params:
  hk_min: 10.0
  hk_max: 100.0
  sy_min: 0.1
  sy_max: 0.35
  pumping_min: -8000.0
  pumping_max: -2000.0
  strt_min: 0.5
  strt_max: 3.0
  rch_min: 0.001
  rch_max: 0.01
  sea_level: 0.0
  seawater_density_ratio: 1.025
seawater:
  enabled: true
  boundary_location: left
  ghyben_herzberg_ratio: 40
augmentation:
  enabled: true
  method: parameter_sampling
  n_augmented_per_sample: 0.2
  perturbation_ratio: 0.05
validation:
  max_nan_ratio: 0.05
  min_variance: 1.0e-06
  max_head_value: 5.0
  min_head_value: -2.0
seed: 49
