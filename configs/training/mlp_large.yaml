# MLP 大模型配置 - 用于复杂场景

# 模型配置
model:
  type: mlp
  hidden_dims: [256, 512, 256]  # 从 [64, 128, 64] 大幅提升
  dropout: 0.3  # 从 0.2 增加，防止过拟合

# 训练配置
training:
  batch_size: 128  # 从 256 减小，因为样本少
  learning_rate: 0.0005  # 从 0.001 降低，更稳定
  weight_decay: 0.0001  # 从 0.00001 增加，更强正则化
  max_epochs: 200  # 从 100 增加
  early_stop_r2: 0.90
  patience: 15  # 从 10 增加，给更多时间

# 数据配置
data:
  h5_path: data/modflow/long_term_twoyears_groundwater_timeseries.h5
  train_ratio: 0.8
  val_ratio: 0.2
  normalize_params: true
  normalize_timeseries: true

# 设备配置
device: cpu

# 保存配置
save:
  model_dir: models
  model_name: mlp_large_long_term.pth
  save_history: true
